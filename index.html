<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>El misterio de los Fader</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<section class="section">
<div class="container card hero-copy">
<h2>🎧 Banda sonora de la novela</h2>

<audio id="player" controls>
  <source src="audio/track1.mp3" type="audio/mpeg">
</audio>

<ul class="playlist">
<li onclick="playTrack('audio/track1.mp3')">🌨️ Moscú – Invierno</li>
<li onclick="playTrack('audio/track2.mp3')">💘 Encuentro</li>
<li onclick="playTrack('audio/track3.mp3')">✈️ Viaje</li>
</ul>

</div>
</section>

<script>
function playTrack(src){
 const p=document.getElementById("player");
 p.src=src;
 p.play();
}
</script>

</body>
</html>
